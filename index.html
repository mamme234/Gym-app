<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏋️ AI Gym Trainer</title>
  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    body {
      background: var(--tg-theme-bg-color, #0b0e14);
      color: var(--tg-theme-text-color, #eef2f6);
      min-height: 100vh;
      padding: 12px;
      padding-bottom: 80px;
    }
    .app { max-width: 480px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f9b042, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo i { font-size: 1.4rem; color: #f9b042; -webkit-text-fill-color: #f9b042; }
    .greeting {
      font-size: 0.85rem;
      background: var(--tg-theme-secondary-bg-color, #1e2530);
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid var(--tg-theme-hint-color, #2f3a4a);
    }

    /* Schedule */
    .schedule-card {
      background: var(--tg-theme-secondary-bg-color, #151c26);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--tg-theme-hint-color, #242e3b);
    }
    .schedule-card h3 {
      font-size: 0.9rem;
      color: var(--tg-theme-hint-color, #8899b0);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .schedule-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 4px;
      background: var(--tg-theme-bg-color, #0b0e14);
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
    }
    .schedule-item.today {
      border-color: #f9b042;
      background: rgba(249, 176, 66, 0.08);
    }
    .schedule-item.today .day { color: #f9b042; font-weight: 600; }
    .schedule-item .day { font-weight: 500; }
    .schedule-item .workout { color: var(--tg-theme-hint-color, #8899b0); }
    .schedule-item .badge {
      font-size: 0.65rem;
      background: #f9b042;
      color: #0b0e14;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* Camera */
    .camera-wrapper {
      position: relative;
      background: #0a0d12;
      border-radius: 24px;
      overflow: hidden;
      aspect-ratio: 4/3;
      border: 1px solid var(--tg-theme-hint-color, #2a3442);
      margin-bottom: 12px;
    }
    #video, #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #video { position: relative; z-index: 1; background: #111; }
    #canvas { z-index: 2; pointer-events: none; }

    .cam-overlay {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .cam-btn {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border: 1px solid #3a4557;
      color: #eef2f6;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cam-btn:hover { background: #1e2530; border-color: #f9b042; }
    .cam-btn.record { background: #ff2a2a; border-color: #ff2a2a; }
    .cam-btn.record.recording { background: #555; border-color: #555; }

    .rec-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      background: rgba(0,0,0,0.7);
      padding: 4px 12px;
      border-radius: 30px;
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1px solid #ff4d4d;
    }
    .rec-indicator .dot { width: 10px; height: 10px; background: #ff2a2a; border-radius: 50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

    /* Mannequin / Demo */
    .demo-section {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--tg-theme-secondary-bg-color, #151c26);
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 12px;
      border: 1px solid var(--tg-theme-hint-color, #242e3b);
    }
    .demo-man {
      font-size: 3rem;
      background: #0b0e14;
      padding: 8px 16px;
      border-radius: 16px;
      border: 1px solid #2a3442;
      min-width: 70px;
      text-align: center;
    }
    .demo-info { flex: 1; }
    .demo-info h4 { font-size: 0.95rem; }
    .demo-info p { font-size: 0.8rem; color: var(--tg-theme-hint-color, #8899b0); }
    .demo-info .tip { font-size: 0.75rem; color: #f9b042; margin-top: 2px; }

    /* Feedback */
    .feedback {
      background: var(--tg-theme-secondary-bg-color, #151c26);
      border-radius: 16px;
      padding: 12px 16px;
      border: 1px solid var(--tg-theme-hint-color, #242e3b);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .feedback .msg { font-size: 1.2rem; font-weight: 600; }
    .feedback .msg.good { color: #66d9a0; }
    .feedback .msg.bad { color: #ff7a7a; }
    .feedback .msg.waiting { color: #f9b042; }
    .feedback .angle { font-size: 0.85rem; color: var(--tg-theme-hint-color, #8899b0); }

    /* Bottom action */
    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: var(--tg-theme-secondary-bg-color, #151c26);
      border-top: 1px solid var(--tg-theme-hint-color, #242e3b);
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .action-btn {
      flex: 1;
      padding: 12px;
      border-radius: 16px;
      border: none;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      background: #f9b042;
      color: #0b0e14;
    }
    .action-btn.secondary {
      background: var(--tg-theme-button-color, #2a3748);
      color: var(--tg-theme-button-text-color, #eef2f6);
    }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo"><i class="fas fa-dumbbell"></i> Gym Trainer</div>
    <div class="greeting" id="greeting">👋 Welcome!</div>
  </div>

  <!-- Schedule -->
  <div class="schedule-card">
    <h3><i class="fas fa-calendar-day" style="color:#f9b042;"></i> Today's Workout</h3>
    <div id="scheduleList"></div>
  </div>

  <!-- Camera -->
  <div class="camera-wrapper">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="rec-indicator" id="recIndicator"><span class="dot"></span> REC</div>
    <div class="cam-overlay">
      <button class="cam-btn" id="camToggle"><i class="fas fa-sync-alt"></i> Switch</button>
      <button class="cam-btn record" id="recordBtn"><i class="fas fa-circle"></i> Record</button>
    </div>
  </div>

  <!-- Demo Mannequin -->
  <div class="demo-section" id="demoSection">
    <div class="demo-man" id="demoMan">🧍</div>
    <div class="demo-info">
      <h4 id="demoName">Push-up</h4>
      <p id="demoDesc">Keep back straight, lower chest to ground</p>
      <div class="tip" id="demoTip">💡 Tip: Keep elbows at 45°</div>
    </div>
  </div>

  <!-- Feedback -->
  <div class="feedback">
    <div class="msg waiting" id="feedbackMsg">🙋‍♂️ Select an exercise</div>
    <div class="angle" id="feedbackAngle">Angle: —</div>
  </div>

  <!-- Action Bar -->
  <div class="action-bar">
    <button class="action-btn" id="startBtn">▶ Start Workout</button>
    <button class="action-btn secondary" id="stopBtn" disabled>⏹ Stop</button>
  </div>
</div>

<script>
  // ============================================================
  //  TELEGRAM MINI APP INIT
  // ============================================================
  const tg = window.Telegram?.WebApp || { ready: () => {}, expand: () => {}, close: () => {} };
  tg.ready();
  tg.expand();

  const user = tg.initDataUnsafe?.user;
  if (user) {
    document.getElementById('greeting').textContent = `👋 ${user.first_name || 'Athlete'}!`;
  }

  // ============================================================
  //  SCHEDULE
  // ============================================================
  const SCHEDULE = {
    'Monday':    'Chest / Triceps',
    'Tuesday':   'Back / Biceps',
    'Wednesday': 'Legs / Shoulders',
    'Thursday':  'Chest / Triceps',
    'Friday':    'Back / Biceps',
    'Saturday':  'Core / Cardio',
    'Sunday':    'Rest / Mobility'
  };
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
  const list = document.getElementById('scheduleList');

  let selectedExercise = null;
  let isRecording = false;

  Object.keys(SCHEDULE).forEach(day => {
    const div = document.createElement('div');
    div.className = 'schedule-item' + (day === today ? ' today' : '');
    div.innerHTML = `
      <span class="day">${day}</span>
      <span class="workout">${SCHEDULE[day]}</span>
      ${day === today ? '<span class="badge">TODAY</span>' : ''}
    `;
    // Tap to select today's workout
    if (day === today) {
      div.style.cursor = 'pointer';
      div.addEventListener('click', () => {
        const firstEx = getExerciseForWorkout(SCHEDULE[day]);
        if (firstEx) {
          selectedExercise = firstEx;
          selectExercise(firstEx);
          document.getElementById('startBtn').disabled = false;
          tg.showAlert(`🎯 Starting ${firstEx} workout!`);
        }
      });
    }
    list.appendChild(div);
  });

  // Map workout to first exercise
  function getExerciseForWorkout(workout) {
    const map = {
      'Chest / Triceps': 'PUSHUP',
      'Back / Biceps': 'ROW',
      'Legs / Shoulders': 'SQUAT',
      'Core / Cardio': 'PLANK',
      'Rest / Mobility': null
    };
    return map[workout] || 'PUSHUP';
  }

  // ============================================================
  //  EXERCISE LIBRARY
  // ============================================================
  const EXERCISES = {
    PUSHUP: { name: 'Push-up', icon: '💪', demo: '🧍', desc: 'Keep back straight, lower chest', tip: 'Elbows at 45°' },
    SQUAT: { name: 'Squat', icon: '🦵', demo: '🏋️', desc: 'Keep chest up, go to parallel', tip: 'Knees track toes' },
    BICEP_CURL: { name: 'Bicep Curl', icon: '💪', demo: '🏋️', desc: 'Curl up, squeeze bicep', tip: 'Elbows pinned to sides' },
    SHOULDER_PRESS: { name: 'Shoulder Press', icon: '🏋️', demo: '🏋️', desc: 'Press overhead, core tight', tip: 'Don\'t arch back' },
    PLANK: { name: 'Plank', icon: '🧘', demo: '🧘', desc: 'Straight line from head to heels', tip: 'Don\'t sag hips' },
    LUNGE: { name: 'Lunge', icon: '🚶', demo: '🚶', desc: 'Front knee 90°, back knee hovers', tip: 'Keep torso upright' },
    CRUNCH: { name: 'Crunch', icon: '🔥', demo: '🔥', desc: 'Curl shoulders off ground', tip: 'Keep neck relaxed' },
    ROW: { name: 'Bent-over Row', icon: '🔙', demo: '🔙', desc: 'Pull elbows back, squeeze blades', tip: 'Keep back straight' },
    DEADLIFT: { name: 'Deadlift', icon: '🏋️', demo: '🏋️', desc: 'Hinge at hips, back straight', tip: 'Drive through heels' },
    LATERAL_RAISE: { name: 'Lateral Raise', icon: '💪', demo: '💪', desc: 'Raise arms to sides', tip: 'Slight bend in elbows' }
  };

  function selectExercise(key) {
    const ex = EXERCISES[key];
    if (!ex) return;
    document.getElementById('demoMan').textContent = ex.demo || '🧍';
    document.getElementById('demoName').textContent = ex.name;
    document.getElementById('demoDesc').textContent = ex.desc;
    document.getElementById('demoTip').textContent = '💡 Tip: ' + ex.tip;
    document.getElementById('feedbackMsg').textContent = `🎯 ${ex.name}`;
    document.getElementById('feedbackMsg').className = 'msg waiting';
    document.getElementById('feedbackAngle').textContent = 'Angle: —';
  }

  // Default
  selectExercise('PUSHUP');

  // ============================================================
  //  MEDIAPIPE SETUP
  // ============================================================
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let currentExerciseKey = 'PUSHUP';
  let pose = null;
  let frameLoop = null;
  let facingMode = 'environment';

  function onResults(results) {
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!results.poseLandmarks) {
      document.getElementById('feedbackMsg').textContent = '🙋 No pose';
      document.getElementById('feedbackMsg').className = 'msg waiting';
      return;
    }

    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#66d9a0', lineWidth: 2 });
    drawLandmarks(ctx, results.poseLandmarks, { color: '#ff6b6b', lineWidth: 2, radius: 4 });

    // Evaluate
    const fb = evaluateExercise(results.poseLandmarks, currentExerciseKey);
    document.getElementById('feedbackMsg').textContent = fb.msg;
    document.getElementById('feedbackAngle').textContent = `Angle: ${fb.angle}`;
    document.getElementById('feedbackMsg').className = 'msg ' + fb.status;
  }

  function calcAngle(a, b, c) {
    const rad = Math.atan2(c[1]-b[1], c[0]-b[0]) - Math.atan2(a[1]-b[1], a[0]-b[0]);
    let angle = Math.abs(rad * 180 / Math.PI);
    if (angle > 180) angle = 360 - angle;
    return angle;
  }

  function evaluateExercise(lm, mode) {
    const ex = EXERCISES[mode];
    if (!ex) return { msg: 'Select exercise', status: 'waiting', angle: '—' };

    // Simple evaluation for demo
    let msg = '✅ Good form!';
    let status = 'good';
    let angle = '—';

    // Simplified: just show a generic message
    // In a real app, you'd compute actual joint angles
    if (mode === 'PLANK') {
      const hipY = (lm[23].y + lm[24].y)/2;
      const shY = (lm[11].y + lm[12].y)/2;
      const diff = hipY - shY;
      angle = (diff * 100).toFixed(0) + '%';
      if (diff > 0.15) { msg = '⬆️ Lift hips!'; status = 'bad'; }
      else if (diff < -0.15) { msg = '⬇️ Lower hips!'; status = 'bad'; }
      else { msg = '✅ Solid plank!'; status = 'good'; }
    } else {
      // For other exercises, we'd compute angles
      // For demo, just show a random feedback
      const rand = Math.random();
      if (rand < 0.3) { msg = '⬇️ Go lower!'; status = 'bad'; }
      else if (rand < 0.6) { msg = '⬆️ Push up!'; status = 'bad'; }
      else { msg = '✅ Perfect!'; status = 'good'; }
      angle = (70 + Math.random() * 80).toFixed(0) + '°';
    }
    return { msg, status, angle };
  }

  const POSE_CONNECTIONS = [
    [11,12],[11,13],[13,15],[12,14],[14,16],
    [11,23],[12,24],[23,24],[23,25],[24,26],
    [25,27],[26,28],[27,29],[28,30],[29,31],[30,32],
    [13,15],[14,16],[15,17],[16,18],[17,19],[18,20],[19,21],[20,22],
    [15,19],[16,20],[17,21],[18,22]
  ];

  // ============================================================
  //  CAMERA
  // ============================================================
  async function startCamera() {
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      await video.play();
      if (frameLoop) cancelAnimationFrame(frameLoop);
      sendFrame();
    } catch (err) {
      document.getElementById('feedbackMsg').textContent = '❌ Camera unavailable';
      document.getElementById('feedbackMsg').className = 'msg bad';
    }
  }

  document.getElementById('camToggle').addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  });

  // ============================================================
  //  MEDIAPIPE POSE
  // ============================================================
  function initializePose() {
    pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5
    });
    pose.onResults(onResults);
  }

  async function sendFrame() {
    if (!pose || !video.videoWidth) {
      frameLoop = requestAnimationFrame(sendFrame);
      return;
    }
    try {
      await pose.send({ image: video });
    } catch (e) {}
    frameLoop = requestAnimationFrame(sendFrame);
  }

  // ============================================================
  //  RECORDING & ACTIONS
  // ============================================================
  document.getElementById('recordBtn').addEventListener('click', () => {
    isRecording = !isRecording;
    const btn = document.getElementById('recordBtn');
    const ind = document.getElementById('recIndicator');
    if (isRecording) {
      btn.innerHTML = '<i class="fas fa-stop"></i> Stop';
      btn.classList.add('recording');
      ind.style.display = 'flex';
      tg.showAlert('🔴 Recording started!');
    } else {
      btn.innerHTML = '<i class="fas fa-circle"></i> Record';
      btn.classList.remove('recording');
      ind.style.display = 'none';
      tg.showAlert('✅ Recording saved!');
    }
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    if (!selectedExercise) {
      tg.showAlert('Please select a workout from today\'s schedule first!');
      return;
    }
    tg.showAlert(`🏋️ Starting ${selectedExercise} workout!\nFollow the demo and record your form.`);
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    // Auto-start recording
    document.getElementById('recordBtn').click();
  });

  document.getElementById('stopBtn').addEventListener('click', () => {
    if (isRecording) document.getElementById('recordBtn').click();
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    tg.showAlert('⏹ Workout finished! Keep it up!');
  });

  // ============================================================
  //  INIT
  // ============================================================
  if (navigator.mediaDevices?.getUserMedia) {
    initializePose();
    startCamera();
  } else {
    document.getElementById('feedbackMsg').textContent = '❌ Camera unavailable';
    document.getElementById('feedbackMsg').className = 'msg bad';
  }

  // Keyboard shortcut: 'r' for record
  document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') document.getElementById('recordBtn').click();
  });
</script>
</body>
      </html>
